apiVersion: v1
kind: Namespace
metadata:
  name: praxis-test
  labels:
    app.kubernetes.io/managed-by: praxis-extproc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: praxis-test
  labels:
    app: echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          image: gcr.io/istio-testing/app:latest
          args:
            - "--port=8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: praxis-test
  labels:
    app: echo
spec:
  selector:
    app: echo
  ports:
    - port: 8080
      targetPort: 8080
