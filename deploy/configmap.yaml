apiVersion: v1
kind: ConfigMap
metadata:
  name: praxis-extproc
  namespace: praxis-extproc
  labels:
    app.kubernetes.io/name: praxis-extproc
    app.kubernetes.io/managed-by: praxis-extproc
data:
  extproc.yaml: |
    server:
      grpc_address: "0.0.0.0:50051"
      health_address: "0.0.0.0:50052"
      metrics_address: "0.0.0.0:9090"
      tls:
        mode: none

    filter_chains:
      - name: integration-test
        filters:
          - filter: request_id
          - filter: headers
            request_add:
              - name: X-Processed-By
                value: praxis-extproc
            response_set:
              - name: X-Praxis
                value: "true"

    insecure_options:
      allow_unbounded_body: true
