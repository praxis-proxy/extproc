apiVersion: v1
kind: Service
metadata:
  name: praxis-extproc
  namespace: praxis-extproc
  labels:
    app.kubernetes.io/name: praxis-extproc
    app.kubernetes.io/managed-by: praxis-extproc
spec:
  selector:
    app.kubernetes.io/name: praxis-extproc
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: health
      port: 50052
      targetPort: 50052
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
