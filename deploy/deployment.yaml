apiVersion: apps/v1
kind: Deployment
metadata:
  name: praxis-extproc
  namespace: praxis-extproc
  labels:
    app.kubernetes.io/name: praxis-extproc
    app.kubernetes.io/managed-by: praxis-extproc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: praxis-extproc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: praxis-extproc
    spec:
      containers:
        - name: praxis-extproc
          image: praxis-extproc:dev
          imagePullPolicy: IfNotPresent
          args:
            - "-c"
            - "/etc/praxis/extproc.yaml"
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: health
              containerPort: 50052
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/praxis
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      volumes:
        - name: config
          configMap:
            name: praxis-extproc
